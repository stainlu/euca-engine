[package]
name = "euca-cli"
version.workspace = true
edition.workspace = true
description = "CLI tool with 25+ command groups for engine control and asset pipeline"
keywords = ["gamedev", "game-engine", "cli", "tools", "asset-pipeline"]
categories = ["game-development", "command-line-utilities"]

[[bin]]
name = "euca"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
log = "0.4"
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
euca-asset = { path = "../../crates/euca-asset" }
euca-render = { path = "../../crates/euca-render" }
