[package]
name = "euca-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "euca"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
